name: Validate registry

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate every plugin registration
        run: |
          set -e
          for dir in plugins/*/; do
            id=$(basename "$dir")
            test -f "$dir/plugin.json" || { echo "$id: missing plugin.json"; exit 1; }
            test -f "$dir/README.md" || { echo "$id: missing README.md (the catalog page)"; exit 1; }
            npx --yes ajv-cli@5 validate -s plugin.schema.json -d "$dir/plugin.json" --strict=false
            declared=$(node -p "require('./$dir/plugin.json').id")
            [ "$declared" = "$id" ] || { echo "$id: plugin.json declares id \"$declared\"; the folder name must equal the id"; exit 1; }
          done

      - name: Reject hand edits to generated files in PRs
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "${{ github.base_ref }}"
          if ! git diff --quiet "origin/${{ github.base_ref }}" HEAD -- index.json docs/plugin-catalog.md; then
            echo "index.json and docs/plugin-catalog.md are generated from plugins/*/plugin.json."
            echo "Do not edit them in a PR; they are regenerated automatically on merge to main."
            git diff --stat "origin/${{ github.base_ref }}" HEAD -- index.json docs/plugin-catalog.md
            exit 1
          fi

      - name: Generate index.json and the catalog
        run: node scripts/build-index.mjs

      - name: Validate the generated index against its schema
        run: npx --yes ajv-cli@5 validate -s index.schema.json -d index.json --strict=false

      - name: Commit regenerated files on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- index.json docs/plugin-catalog.md; then
            echo "generated files already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json docs/plugin-catalog.md
          git commit -m "chore: regenerate index and catalog"
          git push
