name: Docs site

# Publish the plugin docs as a static website rendered by Glyph itself (the
# workspace website export), deployed to GitHub Pages at
# glyph-md.github.io/plugins. Only docs/ is exported; registration folders,
# the repo README, and CONTRIBUTING stay GitHub-only, and the generated
# catalog links plugin READMEs on GitHub. plugins/** stays in the path filter
# because registration changes regenerate docs/plugin-catalog.md.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "plugins/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-site
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      # docs/ is the workspace: its README.md becomes the site index and
      # docs/.glyph/site.json carries the site title. Everything the site
      # needs lives inside docs/, so nothing outside it leaks into the export.
      - uses: glyph-md/export-website-action@v1
        with:
          workspace: docs
          output: site

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
